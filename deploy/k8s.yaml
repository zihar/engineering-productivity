---
# --------------------------------------------------------------------- Postgres
apiVersion: v1
kind: Service
metadata:
  name: ep-postgres
  namespace: engineering-productivity
spec:
  selector: { app: ep-postgres }
  ports: [{ port: 5432, targetPort: 5432 }]
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: ep-postgres
  namespace: engineering-productivity
spec:
  serviceName: ep-postgres
  replicas: 1
  selector: { matchLabels: { app: ep-postgres } }
  template:
    metadata: { labels: { app: ep-postgres } }
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          env:
            - { name: POSTGRES_USER, value: "ep" }
            - { name: POSTGRES_DB, value: "engineering_productivity" }
            - name: POSTGRES_PASSWORD
              valueFrom: { secretKeyRef: { name: ep-secrets, key: POSTGRES_PASSWORD } }
            - { name: PGDATA, value: "/var/lib/postgresql/data/pgdata" }
          ports: [{ containerPort: 5432 }]
          volumeMounts: [{ name: data, mountPath: /var/lib/postgresql/data }]
  volumeClaimTemplates:
    - metadata: { name: data }
      spec:
        accessModes: ["ReadWriteOnce"]
        resources: { requests: { storage: 5Gi } }
---
# --------------------------------------------------------------------- Dashboard
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ep-dashboard
  namespace: engineering-productivity
spec:
  replicas: 1
  selector: { matchLabels: { app: ep-dashboard } }
  template:
    metadata: { labels: { app: ep-dashboard } }
    spec:
      containers:
        - name: dashboard
          image: CHANGE_ME_registry/engineering-productivity:latest
          ports: [{ containerPort: 8501 }]
          envFrom: [{ secretRef: { name: ep-secrets } }]
          volumeMounts:
            - { name: config, mountPath: /app/config.yaml, subPath: config.yaml }
          readinessProbe:
            httpGet: { path: /_stcore/health, port: 8501 }
            initialDelaySeconds: 10
      volumes:
        - { name: config, configMap: { name: ep-config } }
---
apiVersion: v1
kind: Service
metadata:
  name: ep-dashboard
  namespace: engineering-productivity
spec:
  selector: { app: ep-dashboard }
  ports: [{ port: 80, targetPort: 8501 }]
---
# ----------------------------------------------------------------- Nightly refresh
apiVersion: batch/v1
kind: CronJob
metadata:
  name: ep-nightly-refresh
  namespace: engineering-productivity
spec:
  schedule: "0 0 * * *"          # tiap tengah malam
  timeZone: "Asia/Jakarta"       # butuh Kubernetes >= 1.27
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: refresh
              image: CHANGE_ME_registry/engineering-productivity:latest
              # Gather LIVE semua engineer, window 60 hari → warm cache DB + meta.
              command: ["python", "-m", "engineering_productivity",
                        "--days", "60", "-o", "/tmp/nightly.md"]
              envFrom: [{ secretRef: { name: ep-secrets } }]
              volumeMounts:
                - { name: config, mountPath: /app/config.yaml, subPath: config.yaml }
          volumes:
            - { name: config, configMap: { name: ep-config } }
