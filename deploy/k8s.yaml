# =============================================================================
# Manifest Kubernetes: dashboard (Deployment) + refresh nightly (CronJob) + Postgres.
#
# Rahasia (token & DSN) lewat Secret/env; config non-rahasia lewat ConfigMap.
# Ganti nilai ber-tanda CHANGE_ME sebelum apply.
#
#   kubectl apply -f deploy/k8s.yaml
#
# Postgres di sini StatefulSet sederhana; untuk produksi pertimbangkan DB terkelola
# (cukup ganti EP_STORE_DSN di Secret, lalu hapus blok Postgres).
# =============================================================================
---
apiVersion: v1
kind: Secret
metadata:
  name: ep-secrets
  namespace: engineering-productivity
type: Opaque
stringData:
  CLICKUP_TOKEN: "CHANGE_ME_pk_xxx"
  GITLAB_TOKEN: "CHANGE_ME_glpat_xxx"
  POSTGRES_PASSWORD: "CHANGE_ME_dbpass"
  # Host = service Postgres di bawah; ganti bila pakai DB terkelola.
  EP_STORE_DSN: "postgresql://ep:CHANGE_ME_dbpass@ep-postgres:5432/engineering_productivity"
---
