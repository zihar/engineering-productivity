# Salin file ini ke config.yaml lalu isi sesuai timmu.
# config.yaml di-gitignore supaya token tidak ikut ter-commit.

# Personal API token ClickUp (Settings -> Apps -> Generate, formatnya "pk_...").
# Bisa juga lewat environment variable CLICKUP_TOKEN (lebih aman) -> kosongkan baris ini.
token: ""

# ID workspace/team ClickUp. Kalau dikosongkan, tool memakai team pertama
# yang bisa diakses token-mu (jalankan dengan --list-teams untuk melihat daftarnya).
team_id: ""

# Atribusi task→engineer mengikuti custom field "Developer" (tipe users), bukan assignees.
# Nama field di-resolve otomatis (auto-discover by name); ubah bila kolommu beda nama.
developer_field_name: "Developer"
# Override opsional: isi id field langsung untuk melewati auto-discover by name.
# developer_field_id: "d3746bac-ea40-42a7-87a8-520627e1f756"

# (Opsional) Sumber aktivitas commit — GitLab API langsung (LIVE). Disarankan.
#    Token: https://git.bluebird.id/-/user_settings/personal_access_tokens (scope read_api)
#    atau env GITLAB_TOKEN. projects = daftar id/path repo yang dianalisis.
gitlab:
  url: "https://git.bluebird.id"
  token: ""
  projects: []          # opsional seed; auto-discover aktif default. mis. [692, "da/driverapp-gateway"]
  aliases: {}           # mis. {"orang@gmail.com": "orang@bluebirdgroup.com"}
  noise_patterns: []    # tambahan pola file noise (di luar default vendor/lock/generated)
#
# Commit selalu dari GitLab (bila terkonfigurasi di atas); tanpa GitLab, metrik commit dilewati.

# (Opsional) Cache Postgres: simpan time_in_status (deep) & commit agar load berikutnya cepat
# (incremental — hanya delta yang ditarik; data done/immutable tak diulang). Bisa via env EP_STORE_DSN.
# Buat dulu database-nya: `createdb engineering_productivity`. Tanpa DSN = mode live (tanpa cache).
store:
  dsn: ""  # contoh: postgres://localhost:5432/engineering_productivity

# Daftar engineer yang mau dianalisis. Boleh pakai email ATAU id numerik.
# Email akan di-resolve otomatis ke id lewat daftar member workspace.
engineers:
  - name: "Contoh Engineer A"
    email: "engineer.a@example.com"
  - name: "Contoh Engineer B"
    id: 12345678
